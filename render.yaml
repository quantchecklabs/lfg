services:
  - type: web
    name: lfg
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: LFG_HOST
        value: 0.0.0.0
      - key: LFG_PORT
        value: 8766
      - key: LFG_REPOS_ROOT
        value: /data/repos
    disk:
      name: lfg-data
      mountPath: /data
      sizeGB: 1
